name: Terraform CI/CD


on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    # types:
    #   - opened
    #   - synchronize
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    name: 'Terraform Lint, Security Check, and Deploy'
    runs-on: ubuntu-latest
    environment: Dev
    if: github.event_name == 'pull_request'
    env:
      AWS_REGION: 'us-east-1'
      TF_VERSION: '1.14.8'
      TFLINT_VERSION: '0.61.0'  # Updated to a more recent version
      TFSEC_VERSION: '1.28.14'   # Updated to a more recent version

    steps:
    - name: 'Checkout GitHub repository'
      uses: actions/checkout@v2

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        role-to-assume: arn:aws:iam::855374748535:role/mfsg-github-actions-role
        role-session-name: GitHub_to_AWS_via_FederatedOIDC
        aws-region: us-east-1

    - name: Sts GetCallerIdentity
      run: |
        aws sts get-caller-identity

    - name: 'Set up Terraform'
      uses: hashicorp/setup-terraform@v1
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: 'Install TFLint'
      run: |
        curl -sLo tflint.zip https://github.com/terraform-linters/tflint/releases/download/v${{ env.TFLINT_VERSION }}/tflint_linux_amd64.zip
        unzip tflint.zip -d /usr/local/bin/
        tflint --version

    - name: 'Install tfsec'
      run: |
        curl -sLo tfsec https://github.com/aquasecurity/tfsec/releases/download/v${{ env.TFSEC_VERSION }}/tfsec-linux-amd64
        chmod +x tfsec
        mv tfsec /usr/local/bin/
        tfsec --version

    - name: 'Terraform Init'
      run: terraform init

    - name: 'Terraform Format'
      run: terraform fmt

    - name: 'Terraform Validate'
      run: terraform validate

    # - name: 'TFLint'
    #   run: |
    #     tflint --init
    #     tflint

    - name: 'tfsec'
      run: tfsec . --format sarif --out tfsec.sarif || true

    - name: 'Terraform Plan'
      run: terraform plan -out=tfplan

  deploy:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    environment: Dev
    #needs: plan

    env:
      AWS_REGION: 'us-east-1'
      TF_VERSION: '1.14.4'

    steps:
    - name: 'Checkout GitHub repository'
      uses: actions/checkout@v2

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        role-to-assume: arn:aws:iam::855374748535:role/mfsg-github-actions-role
        role-session-name: GitHub_to_AWS_via_FederatedOIDC
        aws-region: us-east-1

    - name: 'Set up Terraform'
      uses: hashicorp/setup-terraform@v1
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: 'Terraform Init'
      run: terraform init

    - name: 'Terraform Plan'
      run: terraform plan -out=tfplan

    - name: 'Terraform Apply'
      if: github.ref == 'refs/heads/main'
      run: terraform apply -auto-approve tfplan
