name: "Terraform CI/CD — QA Tags"

on:
  workflow_dispatch:
    inputs:
      run_apply:
        description: 'Apply changes after plan?'
        required: true
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  TF_VERSION: "1.5.7"
  WORKING_DIR: environments/qa

jobs:
  terraform-tags-checks:
    name: "QA Tags — Format, Validate & Plan"
    runs-on: ubuntu-latest
    environment: QA
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      # ── Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Setup Terraform ──
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ── Configure AWS credentials for S3 backend ──
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_IAM_ROLE_NAME }}
          aws-region: ${{ vars.AWS_REGION }}

      # ── Write Snowflake private key ──
      - name: Write Snowflake RSA key
        run: |
          printf '%s' "${{ secrets.RSA_KEY_SNOWFLAKE }}" | sed 's/\\n/\n/g' > rsa_key.p8
          chmod 600 rsa_key.p8
          for dir in ../../modules/account_role ../../modules/database ../../modules/schema ../../modules/warehouse; do
            cp rsa_key.p8 "$dir/rsa_key.p8"
          done

      # ── Format Check ──
      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      # ── Init ──
      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      # ── Validate ──
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      # ── Plan ──
      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -input=false \
            -target=snowflake_tag.terraform_managed \
            -target=snowflake_tag_association.warehouses \
            -target=snowflake_tag_association.databases \
            -target=snowflake_tag_association.schemas \
            -target=snowflake_tag_association.roles
        continue-on-error: true
        env:
          TF_VAR_snowflake_org_name: ${{ vars.SNOWFLAKE_ORG_NAME }}
          TF_VAR_snowflake_account_name: ${{ vars.SNOWFLAKE_ACCOUNT }}
          TF_VAR_snowflake_user: ${{ vars.SNOWFLAKE_USER }}
          TF_VAR_snowflake_role: ${{ vars.SNOWFLAKE_ROLE }}
          TF_VAR_snowflake_private_key_passphrase: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
          TF_VAR_snowflake_warehouse: ${{ vars.SNOWFLAKE_WAREHOUSE }}

      # ── Fail if any check failed ──
      - name: Check results
        if: steps.fmt.outcome == 'failure' || steps.validate.outcome == 'failure' || steps.plan.outcome == 'failure'
        run: |
          echo "::error::One or more Terraform checks failed."
          echo "  Format:   ${{ steps.fmt.outcome }}"
          echo "  Validate: ${{ steps.validate.outcome }}"
          echo "  Plan:     ${{ steps.plan.outcome }}"
          exit 1

      # ── Cleanup ──
      - name: Cleanup key files
        if: always()
        run: |
          rm -f rsa_key.p8
          rm -f ../../modules/*/rsa_key.p8

  terraform-tags-apply:
    name: "QA Tags — Apply"
    needs: terraform-tags-checks
    runs-on: ubuntu-latest
    environment: QA
    if: github.event.inputs.run_apply == 'yes'
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      # ── Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Setup Terraform ──
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ── Configure AWS credentials for S3 backend ──
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_IAM_ROLE_NAME }}
          aws-region: ${{ vars.AWS_REGION }}

      # ── Write Snowflake private key ──
      - name: Write Snowflake RSA key
        run: |
          printf '%s' "${{ secrets.RSA_KEY_SNOWFLAKE }}" | sed 's/\\n/\n/g' > rsa_key.p8
          chmod 600 rsa_key.p8
          for dir in ../../modules/account_role ../../modules/database ../../modules/schema ../../modules/warehouse; do
            cp rsa_key.p8 "$dir/rsa_key.p8"
          done

      # ── Init ──
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      # ── Apply ──
      - name: Terraform Apply
        run: |
          terraform apply -auto-approve -input=false \
            -target=snowflake_tag.terraform_managed \
            -target=snowflake_tag_association.warehouses \
            -target=snowflake_tag_association.databases \
            -target=snowflake_tag_association.schemas \
            -target=snowflake_tag_association.roles
        env:
          TF_VAR_snowflake_org_name: ${{ vars.SNOWFLAKE_ORG_NAME }}
          TF_VAR_snowflake_account_name: ${{ vars.SNOWFLAKE_ACCOUNT }}
          TF_VAR_snowflake_user: ${{ vars.SNOWFLAKE_USER }}
          TF_VAR_snowflake_role: ${{ vars.SNOWFLAKE_ROLE }}
          TF_VAR_snowflake_private_key_passphrase: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
          TF_VAR_snowflake_warehouse: ${{ vars.SNOWFLAKE_WAREHOUSE }}

      # ── Cleanup ──
      - name: Cleanup key files
        if: always()
        run: |
          rm -f rsa_key.p8
          rm -f ../../modules/*/rsa_key.p8
