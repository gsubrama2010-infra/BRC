name: "Terraform CI — QA"

on:
  pull_request:
    branches: [Dev]
    paths:
      - "environments/qa/**"
      - "modules/**"
  push:
    branches: [Dev]
    paths:
      - "environments/qa/**"
      - "modules/**"

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.5.7"
  WORKING_DIR: environments/qa

jobs:
  terraform-checks:
    name: "QA — Format, Validate & Plan"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Write Snowflake RSA key
        run: |
          echo "${{ secrets.SNOWFLAKE_QA_PRIVATE_KEY }}" > rsa_key.p8
          chmod 600 rsa_key.p8
          for dir in ../../modules/account_role ../../modules/database ../../modules/schema ../../modules/warehouse; do
            cp rsa_key.p8 "$dir/rsa_key.p8"
          done

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false
        continue-on-error: true

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fmtOutcome  = '${{ steps.fmt.outcome }}';
            const initOutcome = '${{ steps.init.outcome }}';
            const valOutcome  = '${{ steps.validate.outcome }}';
            const planOutcome = '${{ steps.plan.outcome }}';
            const planOutput  = `${{ steps.plan.outputs.stdout }}`.slice(-60000);

            const icon = (s) => s === 'success' ? '✅' : '❌';

            const body = `### Terraform CI — QA Environment
            | Check | Status |
            |-------|--------|
            | Format | ${icon(fmtOutcome)} \`${fmtOutcome}\` |
            | Init   | ${icon(initOutcome)} \`${initOutcome}\` |
            | Validate | ${icon(valOutcome)} \`${valOutcome}\` |
            | Plan   | ${icon(planOutcome)} \`${planOutcome}\` |

            <details><summary>Show Plan Output</summary>

            \`\`\`
            ${planOutput}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Check results
        if: steps.fmt.outcome == 'failure' || steps.validate.outcome == 'failure' || steps.plan.outcome == 'failure'
        run: |
          echo "::error::One or more Terraform checks failed."
          echo "  Format:   ${{ steps.fmt.outcome }}"
          echo "  Validate: ${{ steps.validate.outcome }}"
          echo "  Plan:     ${{ steps.plan.outcome }}"
          exit 1

      - name: Cleanup key files
        if: always()
        run: |
          rm -f rsa_key.p8
          rm -f ../../modules/*/rsa_key.p8
