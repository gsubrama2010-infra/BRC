name: "Terraform CI/CD — QA"

on:
  workflow_dispatch:
    inputs:
      run_apply:
        description: 'Apply changes after plan?'
        required: true
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'

# on:
#   pull_request:
#     branches: [Dev]
#     paths:
#       - "environments/qa/**"
#       - "modules/**"
#   push:
#     branches: [Dev]
#     paths:
#       - "environments/qa/**"
#       - "modules/**"

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  TF_VERSION: "1.5.7"
  WORKING_DIR: environments/qa

jobs:
  terraform-checks:
    name: "QA — Format, Validate & Plan"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      # ── Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Setup Terraform ──
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ── Configure AWS credentials for S3 backend ──
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::524320491046:role/mfsg-github-actions-role
          aws-region: us-east-1

      # ── Write Snowflake private key ──
      - name: Write Snowflake RSA key
        run: |
          printf '%s' "${{ secrets.SNOWFLAKE_QA_PRIVATE_KEY }}" | sed 's/\\n/\n/g' > rsa_key.p8
          chmod 600 rsa_key.p8
          for dir in ../../modules/account_role ../../modules/database ../../modules/schema ../../modules/warehouse; do
            cp rsa_key.p8 "$dir/rsa_key.p8"
          done

      # ── Format Check ──
      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      # ── Init ──
      - name: Terraform Init
        id: init
        run: terraform init

      # ── Validate ──
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      # ── Plan ──
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false
        continue-on-error: true

      # ── Post PR Comment ──
      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fmtOutcome  = '${{ steps.fmt.outcome }}';
            const initOutcome = '${{ steps.init.outcome }}';
            const valOutcome  = '${{ steps.validate.outcome }}';
            const planOutcome = '${{ steps.plan.outcome }}';
            const planOutput  = `${{ steps.plan.outputs.stdout }}`.slice(-60000);

            const icon = (s) => s === 'success' ? '✅' : '❌';

            const body = `### Terraform CI — QA
            | Check | Status |
            |-------|--------|
            | Format | ${icon(fmtOutcome)} \`${fmtOutcome}\` |
            | Init   | ${icon(initOutcome)} \`${initOutcome}\` |
            | Validate | ${icon(valOutcome)} \`${valOutcome}\` |
            | Plan   | ${icon(planOutcome)} \`${planOutcome}\` |

            <details><summary>Show Plan Output</summary>

            \`\`\`
            ${planOutput}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      # ── Fail if any check failed ──
      - name: Check results
        if: steps.fmt.outcome == 'failure' || steps.validate.outcome == 'failure' || steps.plan.outcome == 'failure'
        run: |
          echo "::error::One or more Terraform checks failed."
          echo "  Format:   ${{ steps.fmt.outcome }}"
          echo "  Validate: ${{ steps.validate.outcome }}"
          echo "  Plan:     ${{ steps.plan.outcome }}"
          exit 1

      # ── Cleanup ──
      - name: Cleanup key files
        if: always()
        run: |
          rm -f rsa_key.p8
          rm -f ../../modules/*/rsa_key.p8

  terraform-apply:
    name: "QA — Apply"
    needs: terraform-checks
    runs-on: ubuntu-latest
    if: github.event.inputs.run_apply == 'yes'
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      # ── Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Setup Terraform ──
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ── Configure AWS credentials for S3 backend ──
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::524320491046:role/mfsg-github-actions-role
          aws-region: us-east-1

      # ── Write Snowflake private key ──
      - name: Write Snowflake RSA key
        run: |
          printf '%s' "${{ secrets.SNOWFLAKE_QA_PRIVATE_KEY }}" | sed 's/\\n/\n/g' > rsa_key.p8
          chmod 600 rsa_key.p8
          for dir in ../../modules/account_role ../../modules/database ../../modules/schema ../../modules/warehouse; do
            cp rsa_key.p8 "$dir/rsa_key.p8"
          done

      # ── Init ──
      - name: Terraform Init
        run: terraform init

      # ── Apply ──
      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false

      # ── Cleanup ──
      - name: Cleanup key files
        if: always()
        run: |
          rm -f rsa_key.p8
          rm -f ../../modules/*/rsa_key.p8
