name: "Terraform CI — DEV"

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.5.7"

jobs:
  terraform-checks:
    name: "Terraform Format, Validate & Plan"
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Setup Terraform ──
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ── Write Snowflake private key ──
      - name: Write Snowflake RSA key
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > rsa_key.p8
          chmod 600 rsa_key.p8

      # ── Format Check ──
      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      # ── Init ──
      - name: Terraform Init
        id: init
        run: terraform init

      # ── Validate ──
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      # ── Plan ──
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false
        continue-on-error: true

      # ── Post PR Comment ──
      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fmtOutcome  = '${{ steps.fmt.outcome }}';
            const initOutcome = '${{ steps.init.outcome }}';
            const valOutcome  = '${{ steps.validate.outcome }}';
            const planOutcome = '${{ steps.plan.outcome }}';
            const planOutput  = `${{ steps.plan.outputs.stdout }}`.slice(-60000);

            const icon = (s) => s === 'success' ? '✅' : '❌';

            const body = `### Terraform CI — DEV
            | Check | Status |
            |-------|--------|
            | Format | ${icon(fmtOutcome)} \`${fmtOutcome}\` |
            | Init   | ${icon(initOutcome)} \`${initOutcome}\` |
            | Validate | ${icon(valOutcome)} \`${valOutcome}\` |
            | Plan   | ${icon(planOutcome)} \`${planOutcome}\` |

            <details><summary>Show Plan Output</summary>

            \`\`\`
            ${planOutput}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      # ── Fail if any check failed ──
      - name: Check results
        if: steps.fmt.outcome == 'failure' || steps.validate.outcome == 'failure' || steps.plan.outcome == 'failure'
        run: |
          echo "::error::One or more Terraform checks failed."
          echo "  Format:   ${{ steps.fmt.outcome }}"
          echo "  Validate: ${{ steps.validate.outcome }}"
          echo "  Plan:     ${{ steps.plan.outcome }}"
          exit 1

      # ── Cleanup ──
      - name: Cleanup key file
        if: always()
        run: rm -f rsa_key.p8
