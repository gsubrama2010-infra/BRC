name: "TEMP — Destroy QA Databases"

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.5.7"
  WORKING_DIR: environments/qa

jobs:
  destroy-databases:
    name: "Import & Destroy QA Databases"
    runs-on: ubuntu-latest
    environment: QA
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_IAM_ROLE_NAME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Write Snowflake RSA key
        run: |
          printf '%s' "${{ secrets.RSA_KEY_SNOWFLAKE }}" | sed 's/\\n/\n/g' > rsa_key.p8
          chmod 600 rsa_key.p8
          for dir in ../../modules/account_role ../../modules/database ../../modules/schema ../../modules/warehouse; do
            cp rsa_key.p8 "$dir/rsa_key.p8"
          done

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}"

      - name: Import existing databases into state
        env:
          TF_VAR_snowflake_org_name: ${{ secrets.SNOWFLAKE_ORG_NAME }}
          TF_VAR_snowflake_account_name: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          TF_VAR_snowflake_user: ${{ secrets.SNOWFLAKE_USER }}
          TF_VAR_snowflake_role: ${{ secrets.SNOWFLAKE_ROLE }}
          TF_VAR_snowflake_private_key_passphrase: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
        run: |
          terraform import 'module.databases.snowflake_database.this["qa_db_bronze"]' DLSTAGE_BRONZE     || true
          terraform import 'module.databases.snowflake_database.this["qa_db_silver"]' DLSNAPSHOT_SILVER  || true
          terraform import 'module.databases.snowflake_database.this["qa_db_gold"]'   DLCONSUMPTION_GOLD || true
          terraform import 'module.databases.snowflake_database.this["qa_db_admin"]'  ADMIN_INTEGRATION_DB || true

      - name: Destroy databases
        env:
          TF_VAR_snowflake_org_name: ${{ secrets.SNOWFLAKE_ORG_NAME }}
          TF_VAR_snowflake_account_name: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          TF_VAR_snowflake_user: ${{ secrets.SNOWFLAKE_USER }}
          TF_VAR_snowflake_role: ${{ secrets.SNOWFLAKE_ROLE }}
          TF_VAR_snowflake_private_key_passphrase: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
        run: terraform destroy -target='module.databases' -auto-approve

      - name: Cleanup key files
        if: always()
        run: |
          rm -f rsa_key.p8
          rm -f ../../modules/*/rsa_key.p8
